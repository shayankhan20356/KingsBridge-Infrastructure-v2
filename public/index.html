<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-black text-white p-10">
    <form id="contactForm" class="space-y-4 max-w-lg mx-auto">
        <input name="name" placeholder="Name" class="w-full p-2 bg-gray-900 border border-gray-700" required>
        <input name="email" type="email" placeholder="Email" class="w-full p-2 bg-gray-900 border border-gray-700" required>
        <textarea name="message" placeholder="Message" class="w-full p-2 bg-gray-900 border border-gray-700"></textarea>
        <button type="submit" class="bg-blue-600 p-2 w-full font-bold">Transmit</button>
    </form>
    <script src="script.js"></script>
</body>
</html>
